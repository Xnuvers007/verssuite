name: Build Vers Suite Release

on:
  release:
    types: [created]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "VersSuite" main.py
        
    - name: Zip Build Output
      run: |
        Compress-Archive -Path dist\VersSuite\* -DestinationPath VersSuite-Windows.zip
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VersSuite-Windows
        path: VersSuite-Windows.zip
        
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: VersSuite-Windows.zip
