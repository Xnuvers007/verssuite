name: Build and Release Vers Suite

on:
  push:
    tags:
      - "v*"
      - "V*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 3. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 4. Extract version from tag
        shell: bash
        run: |
          TAG_NAME=${{ github.event.release.tag_name || github.ref_name }}
          VERSION=${TAG_NAME#[vV]}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      # ✅ UPX setup for Windows/Linux
      - name: 5a. Setup UPX for Windows/Linux
        if: matrix.os != 'macos-latest'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest

      # ✅ UPX setup for macOS
      - name: 5b. Install UPX on macOS
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - name: 6. Build executable with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "VersSuite" main.py

      - name: 7. Rename output file
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ARTIFACT_NAME="Vers-Suite-v${VERSION}-Windows.exe"
            mv dist/VersSuite.exe "dist/$ARTIFACT_NAME"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            ARTIFACT_NAME="Vers-Suite-v${VERSION}-macOS"
            mv dist/VersSuite "dist/$ARTIFACT_NAME"
          else
            ARTIFACT_NAME="Vers-Suite-v${VERSION}-Linux"
            mv dist/VersSuite "dist/$ARTIFACT_NAME"
          fi
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: 8. Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/${{ env.ARTIFACT_NAME }}

  release:
    name: Create or Update GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || github.event_name == 'release'
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
                    name: Release ${{ github.ref_name }}
          body: |
            🎉 **New release of Vers Suite**

            ✅ Built using PyInstaller
            ✅ UPX compression enabled for all OS
            ✅ Includes support for Windows, macOS, and Linux
            
            ### Panduan Cara Penggunaan (Mac & Linux):
            _Jika macOS/Linux menolak file binary ini karena strict binary format (chmod issue), silakan jalankan command `chmod +x nama_file` di terminal Anda_.

            Download the appropriate version for your OS below.
          files: artifacts/*/*
          generate_release_notes: true
