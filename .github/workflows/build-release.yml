name: Build Vers Suite Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os_name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
            arch: amd64
            ext: ''
          - os: macos-13
            os_name: macOS
            arch: amd64
            ext: '.dmg'
          - os: macos-latest
            os_name: macOS
            arch: arm64
            ext: '.dmg'
          - os: windows-latest
            os_name: Windows
            arch: amd64
            ext: '.exe'
            
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Setup UPX (Windows & Linux Only)
      if: runner.os != 'macOS'
      uses: crazy-max/ghaction-upx@v3
      with:
        install-only: true
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "VersSuite" main.py
        
    - name: Package & Rename Output File
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "macOS" ]; then
          # Membuat file .dmg khusus Mac menggunakan fitur native mac (hdiutil)
          hdiutil create -volname "VersSuite" -srcfolder dist/VersSuite.app -ov -format UDZO dist/VersSuite-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}
        elif [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/VersSuite.exe dist/VersSuite-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}
        else
          # Linux
          mv dist/VersSuite dist/VersSuite-${{ matrix.os_name }}-${{ matrix.arch }}
        fi
        
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VersSuite-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}
        generate_release_notes: true
